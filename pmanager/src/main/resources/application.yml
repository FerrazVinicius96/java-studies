server:
  servlet:
    context-path: /
  port: 9090

spring:
  jackson:
    default-property-inclusion: non_null
  application:
    name: PManager
  datasource:
    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update